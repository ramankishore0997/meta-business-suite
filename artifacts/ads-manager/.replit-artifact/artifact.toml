kind = "web"
previewPath = "/"
title = "Ads Manager"
version = "1.0.0"
id = "artifacts/ads-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19348

[services.development]
run = "pnpm --filter @workspace/ads-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ads-manager", "run", "build" ]
publicDir = "artifacts/ads-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19348"
BASE_PATH = "/"
