components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Campaign ──────────────────────────────────────────────────
    Campaign:
      type: object
      required: [id, name, status, objective, budgetType, dailyBudget, totalBudget, amountSpent, impressions, reach, clicks, results, costPerResult, cpm, ctr, frequency, delivery, startDate, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, PAUSED, DELETED, ARCHIVED]
        objective:
          type: string
          enum: [AWARENESS, TRAFFIC, ENGAGEMENT, LEADS, APP_PROMOTION, SALES, MESSAGES]
        budgetType:
          type: string
          enum: [daily, lifetime, ad_set_budget]
        dailyBudget:
          type: ["number", "null"]
        totalBudget:
          type: ["number", "null"]
        amountSpent:
          type: number
        impressions:
          type: integer
        reach:
          type: integer
        clicks:
          type: integer
        results:
          type: integer
        costPerResult:
          type: ["number", "null"]
        cpm:
          type: ["number", "null"]
        ctr:
          type: ["number", "null"]
        frequency:
          type: ["number", "null"]
        delivery:
          type: string
          enum: [active, learning, off, error, not_delivering]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        buyingType:
          type: ["string", "null"]
        specialCategories:
          type: ["string", "null"]
        abTestEnabled:
          type: ["boolean", "null"]
        recommendation:
          type: ["string", "null"]
        createdAt:
          type: string

    CampaignInput:
      type: object
      required: [name, objective, budgetType]
      properties:
        name:
          type: string
        objective:
          type: string
          enum: [AWARENESS, TRAFFIC, ENGAGEMENT, LEADS, APP_PROMOTION, SALES, MESSAGES]
        budgetType:
          type: string
          enum: [daily, lifetime, ad_set_budget]
        dailyBudget:
          type: ["number", "null"]
        totalBudget:
          type: ["number", "null"]
        amountSpent:
          type: ["number", "null"]
        costPerResult:
          type: ["number", "null"]
        buyingType:
          type: ["string", "null"]
        specialCategories:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        abTestEnabled:
          type: ["boolean", "null"]

    CampaignUpdate:
      type: object
      properties:
        name:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        objective:
          type: ["string", "null"]
        budgetType:
          type: ["string", "null"]
        dailyBudget:
          type: ["number", "null"]
        totalBudget:
          type: ["number", "null"]
        amountSpent:
          type: ["number", "null"]
        costPerResult:
          type: ["number", "null"]
        buyingType:
          type: ["string", "null"]
        specialCategories:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        abTestEnabled:
          type: ["boolean", "null"]

    # ── Ad Set ────────────────────────────────────────────────────
