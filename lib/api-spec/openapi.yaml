        instagramHandle:
          type: ["string", "null"]

    # ── Insights ──────────────────────────────────────────────────
    InsightsSummary:
      type: object
      required: [totalSpend, totalImpressions, totalReach, totalClicks, totalResults, avgCpm, avgCtr, avgCostPerResult, activeCampaigns, totalCampaigns]
      properties:
        totalSpend:
          type: number
        totalImpressions:
          type: integer
        totalReach:
          type: integer
        totalClicks:
          type: integer
        totalResults:
          type: integer
        avgCpm:
          type: number
        avgCtr:
          type: number
        avgCostPerResult:
          type: ["number", "null"]
        activeCampaigns:
          type: integer
        totalCampaigns:
          type: integer

    CampaignInsight:
      type: object
      required: [campaignId, campaignName, spend, impressions, reach, clicks, results, cpm, ctr]
      properties:
        campaignId:
          type: integer
        campaignName:
          type: string
        spend:
          type: number
        impressions:
          type: integer
        reach:
          type: integer
        clicks:
          type: integer
        results:
          type: integer
        cpm:
          type: number
        ctr:
          type: number
