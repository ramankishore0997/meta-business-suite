        costPerResult:
          type: ["number", "null"]
        audience:
          type: ["string", "null"]
        conversionLocation:
          type: ["string", "null"]
        facebookPage:
          type: ["string", "null"]
        performanceGoal:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        ageMin:
          type: ["integer", "null"]
        ageMax:
          type: ["integer", "null"]
        languages:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        detailedTargeting:
          type: ["string", "null"]
        placementMode:
          type: ["string", "null"]
        placement:
