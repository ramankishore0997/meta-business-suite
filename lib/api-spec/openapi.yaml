        status:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
        amountSpent:
          type: ["number", "null"]
        costPerResult:
          type: ["number", "null"]
        headline:
          type: ["string", "null"]
        primaryText:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        callToAction:
          type: ["string", "null"]
        destinationUrl:
