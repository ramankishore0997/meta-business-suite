    # ── Ad ────────────────────────────────────────────────────────
    Ad:
      type: object
      required: [id, adsetId, adsetName, campaignId, campaignName, name, status, delivery, format, amountSpent, impressions, reach, clicks, results, costPerResult, cpm, ctr, frequency, createdAt]
      properties:
        id:
          type: integer
        adsetId:
          type: integer
        adsetName:
          type: string
        campaignId:
          type: integer
        campaignName:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, PAUSED, DELETED, ARCHIVED]
        delivery:
          type: string
