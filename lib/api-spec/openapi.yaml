    AdSetInput:
      type: object
      required: [campaignId, name, budgetType]
      properties:
        campaignId:
          type: integer
        name:
          type: string
        budgetType:
          type: string
          enum: [daily, lifetime]
        budget:
          type: ["number", "null"]
        amountSpent:
          type: ["number", "null"]
        costPerResult:
          type: ["number", "null"]
        audience:
          type: ["string", "null"]
        placement:
          type: ["string", "null"]
        optimization:
          type: ["string", "null"]
        conversionLocation:
          type: ["string", "null"]
        facebookPage:
          type: ["string", "null"]
        performanceGoal:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        ageMin:
          type: ["integer", "null"]
        ageMax:
          type: ["integer", "null"]
        languages:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        detailedTargeting:
          type: ["string", "null"]
        placementMode:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]

    AdSetUpdate:
      type: object
      properties:
        name:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        budgetType:
          type: ["string", "null"]
        budget:
